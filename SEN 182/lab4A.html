<!DOCTYPE html>
<html>
<head>
    <title>Orientation Form</title>
</head>
<body>

<h2>Student Orientation Registration</h2>

<form>

<fieldset>
<legend>Student Details</legend>

<label>Full Name:</label><br>
<input type="text" name="fullname" required><br><br>

<label>Matric Number:</label><br>
<input type="text" name="matric" required><br><br>

<label>Email:</label><br>
<input type="email" name="email" required><br><br>

<label>Age:</label><br>
<input type="number" name="age"><br><br>

<p>Gender:</p>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female<br><br>

<label>Date of Birth:</label><br>
<input type="date" name="dob"><br><br>

<label>Faculty:</label><br>
<select name="faculty">
    <option>Science</option>
    <option>Arts</option>
    <option>Management</option>
</select><br><br>

<p>Documents Submitted:</p>
<input type="checkbox" name="docs"> Admission Letter
<input type="checkbox" name="docs"> Receipt<br><br>

<label>Upload Passport:</label><br>
<input type="file"><br><br>

<label>Additional Comments:</label><br>
<textarea rows="4" cols="30"></textarea><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</fieldset>

</form>

</body>
</html>
